server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # The API sets its own; these protect the HTML shell that loads the SPA.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;          # no clickjacking the timesheet
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # 'unsafe-inline' for style-src is required by MUI/Emotion, which injects its
    # styles as inline <style> tags at runtime. script-src has NO unsafe-inline —
    # that is the directive that actually stops an XSS payload from executing.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── The API ───────────────────────────────────────────────────────────────
    # Same-origin by design. The refresh cookie is SameSite=Strict, so proxying
    # the API under the SPA's own origin is what lets that cookie work at all
    # without loosening it to SameSite=Lax (which would reopen the CSRF surface
    # the Strict setting exists to close).
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_http_version 1.1;

        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # The API reads this to get the true client IP — without it, every audit
        # row and every rate-limit bucket records nginx's address instead.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Report exports stream and can legitimately take a while.
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Avatars, authenticated by the API via the refresh cookie.
    location /uploads/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host            $proxy_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    # Vite fingerprints every filename with a content hash, so a given URL can
    # never change content. Cache it for a year and never revalidate.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── The SPA ───────────────────────────────────────────────────────────────
    # index.html itself must NEVER be cached. It is the file that names the
    # hashed bundles; a stale copy points at assets that no longer exist, and the
    # user gets a white screen after every deploy until they hard-refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
